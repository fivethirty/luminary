<div class="ship-type">
  <header class="flex-center gap-sm">
    <span class="ship-type-name text-bold"></span>
    <div class="quantity">
      <calc-selector></calc-selector>
    </div>
    <button
      class="remove-btn btn-icon"
      type="button"
      aria-label="Remove ship type"
    >
      ×
    </button>
  </header>
  <div class="ship-representation-notice blueprint-backed-notice" hidden>
    <strong>⚠ Blueprint will be lost on edit</strong>
  </div>
  <div class="ship-representation-notice stats-blueprint-offer" hidden>
    <div>
      <strong>⚠ Stats only! Parts unknown.</strong>
    </div>
    <button class="start-blueprint-btn" type="button">
      Replace with standard blueprint
    </button>
  </div>
  <div class="ship-tile" hidden>
    <img class="ship-tile-image" alt="" />
  </div>
  <div class="stats">
    <div class="stat-group stat-group-core" role="group">
      <div class="stat-group-title">Systems</div>
      <calc-stat-cube data-stat="hull"></calc-stat-cube>
      <calc-stat-cube data-stat="computer"></calc-stat-cube>
      <calc-stat-cube data-stat="shield"></calc-stat-cube>
      <calc-stat-cube data-stat="initiative"></calc-stat-cube>
      <calc-stat-cube data-stat="heal"></calc-stat-cube>
    </div>
    <div class="stat-group stat-group-weapons" role="group">
      <div class="stat-group-title">Cannons</div>
      <calc-stat-cube data-stat="ion-cannon"></calc-stat-cube>
      <calc-stat-cube data-stat="plasma-cannon"></calc-stat-cube>
      <calc-stat-cube data-stat="soliton-cannon"></calc-stat-cube>
      <calc-stat-cube data-stat="antimatter-cannon"></calc-stat-cube>
      <calc-stat-cube data-stat="rift-cannon"></calc-stat-cube>
    </div>
    <div class="stat-group stat-group-missiles" role="group">
      <div class="stat-group-title">Missiles</div>
      <calc-stat-cube data-stat="ion-missile"></calc-stat-cube>
      <calc-stat-cube data-stat="plasma-missile"></calc-stat-cube>
      <calc-stat-cube data-stat="soliton-missile"></calc-stat-cube>
      <calc-stat-cube data-stat="antimatter-missile"></calc-stat-cube>
    </div>
  </div>
</div>
