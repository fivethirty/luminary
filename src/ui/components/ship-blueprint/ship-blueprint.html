<article class="ship-blueprint">
  <header class="blueprint-header flex-center gap-sm">
    <span class="ship-type-name text-bold"></span>
    <div class="quantity"><calc-selector></calc-selector></div>
    <button class="remove-btn btn-icon" type="button">×</button>
  </header>

  <div class="blueprint-editor" hidden>
    <div class="blueprint-workbench">
      <div class="blueprint-visual">
        <div class="blueprint-canvas-wrap">
          <div class="blueprint-canvas">
            <img class="blueprint-background" alt="" />
            <div class="blueprint-slots"></div>
            <div class="blueprint-readouts" role="group">
              <span data-blueprint-stat="initiative"></span>
              <span data-blueprint-stat="energy"></span>
              <span data-blueprint-stat="movement"></span>
              <span data-blueprint-stat="computer"></span>
              <span data-blueprint-stat="hull"></span>
              <span data-blueprint-stat="shield"></span>
            </div>
          </div>
        </div>
        <div class="drive-warning" aria-live="polite" hidden>
          ⚠ No drive installed
        </div>
      </div>

      <div class="blueprint-controls">
        <div class="slot-actions">
          <div class="selected-part" role="status" aria-live="polite">
            Select a ship slot
          </div>
          <div class="slot-action-buttons">
            <button class="edit-part-btn" type="button" disabled>
              Edit
            </button>
            <button class="remove-part-btn" type="button" disabled hidden>
              Remove
            </button>
          </div>
          <div class="recent-parts" hidden>
            <div class="recent-parts-label">Recent Common Parts</div>
            <div class="recent-parts-list"></div>
          </div>
        </div>

        <aside class="external-section" aria-label="External ship bonuses">
          <div class="external-title">EXT</div>
          <div class="external-bonuses"></div>
          <label class="muon-control">
            <input class="muon-checkbox" type="checkbox" />
            <img class="muon-image" alt="" />
            <span>
              <strong>Muon Source</strong>
              <small>+2 energy · +1 init</small>
            </span>
          </label>
        </aside>
      </div>
    </div>
  </div>

  <dialog class="part-dialog">
    <div class="part-dialog-shell">
      <header class="part-dialog-header">
        <div>
          <div class="dialog-kicker">Parts Finder</div>
          <h3 class="part-dialog-title"></h3>
        </div>
        <button class="dialog-close btn-icon" type="button" aria-label="Close">
          ×
        </button>
      </header>
      <label class="part-search-label">
        <span class="sr-only">Search ship parts</span>
        <input
          class="part-search"
          type="search"
          placeholder="Search parts or stats…"
          autocomplete="off"
        />
      </label>
      <div class="part-buckets"></div>
      <div class="part-search-empty" hidden>No matching parts</div>
    </div>
  </dialog>
</article>
