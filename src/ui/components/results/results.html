<div class="results-container">
  <div class="results-card card">
    <div class="results-body" aria-live="polite">
      <div id="odds-strip" class="odds-strip"></div>
      <div id="results-bars" class="results-bars"></div>
      <p class="results-time"></p>
    </div>

    <div id="survivors-section" class="survivors-section">
      <div class="panel-heading">
        <h3>Average survivors</h3>
        <span>Among wins only</span>
      </div>
      <div id="survivors-grid" class="survivors-grid"></div>
    </div>

    <details class="detailed-outcomes">
      <summary class="disclosure-summary">Detailed outcomes</summary>

      <div id="detailed-impact-section" class="detailed-impact-section">
        <div class="impact-grid">
          <div class="impact-summary-column">
            <section id="material-impact" class="impact-card material-impact">
              <h4>Material</h4>
              <table
                class="material-impact-table"
                aria-label="Fleet material cost and expected resources lost"
              >
                <thead>
                  <tr>
                    <th>Fleet</th>
                    <th>Cost</th>
                    <th>Avg. lost</th>
                  </tr>
                </thead>
                <tbody id="material-impact-rows"></tbody>
              </table>
            </section>

            <section
              id="reputation-impact"
              class="impact-card reputation-impact"
            >
              <div class="impact-card-heading">
                <h4>Reputation draws</h4>
                <span>Expected</span>
              </div>
              <div id="reputation-impact-rows"></div>
            </section>

            <section
              id="population-impact"
              class="impact-card population-impact"
            >
              <div class="impact-card-heading population-impact-heading">
                <h4>Sector Wiped (no neutron)</h4>
                <label class="population-select-label">
                  <span>Sector population</span>
                  <select
                    id="sector-population"
                    class="standard-select sector-population-select"
                    aria-label="Sector population"
                  ></select>
                </label>
              </div>
              <div id="population-impact-rows"></div>
            </section>
          </div>

          <section
            id="survivor-distribution-section"
            class="impact-card survivor-distribution-section"
          >
            <h4>Surviving fleet</h4>
            <div class="composition-table-wrap">
              <table
                class="composition-table"
                aria-label="Surviving fleet probabilities"
              >
                <thead>
                  <tr>
                    <th>Faction</th>
                    <th>Ship</th>
                    <th>Odds</th>
                  </tr>
                </thead>
                <tbody id="survivor-distribution-tbody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </details>

    <div class="results-actions">
      <button class="copy-link-btn">Copy link</button>
      <button class="copy-chat-btn">Copy for chat</button>
    </div>
  </div>
</div>
