<div class="fleet card">
  <div class="fleet-header card-header flex-center gap-sm">
    <span class="fleet-name text-bold"></span>
    <select class="ship-selector">
      <option value="">+ Ship Type</option>
      <option value="interceptor">Interceptor</option>
      <option value="cruiser">Cruiser</option>
      <option value="dreadnought">Dreadnought</option>
      <option value="starbase">Starbase</option>
      <option value="orbital">Orbital</option>
      <option value="ancient">Ancient</option>
      <option value="ancient-adv">Ancient (A)</option>
      <option value="ancient-wa">Ancient (WA)</option>
      <option value="guardian">Guardian</option>
      <option value="guardian-adv">Guardian (A)</option>
      <option value="guardian-wa">Guardian (WA)</option>
      <option value="gcds">GCDS</option>
      <option value="gcds-adv">GCDS (A)</option>
      <option value="gcds-wa">GCDS (WA)</option>
    </select>
    <button class="remove-btn btn-icon">×</button>
  </div>
  <div class="preset-chips" hidden>
    <span class="preset-chips-label">Quick add</span>
    <button class="preset-chip" data-preset="ancient">Ancient</button>
    <button class="preset-chip" data-preset="guardian">Guardian</button>
    <button class="preset-chip" data-preset="gcds">GCDS</button>
  </div>
  <div class="fleet-ships">
  </div>
  <div class="fleet-tech">
    <label class="tech-option">
      <input type="checkbox" class="antimatter-splitter-checkbox">
      <span>Antimatter Splitter</span>
    </label>
    <label class="tech-option damage-planner-option">
      <span>Damage Planner</span>
      <select class="planner-type-select">
        <option value="dps">Max DPS removal</option>
        <option value="optimal">Optimal</option>
        <option value="npc" hidden>NPC</option>
      </select>
    </label>
  </div>
</div>
