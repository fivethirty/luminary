<div class="fleet ui-card">
  <div class="fleet-header ui-card__header ui-cluster">
    <div class="fleet-title-row">
      <div class="role-controls" aria-label="Battle position controls">
        <button
          class="move-up-btn ui-icon-button"
          type="button"
          aria-label="Move up"
        >
          ↑
        </button>
        <button
          class="move-down-btn ui-icon-button"
          type="button"
          aria-label="Move down"
        >
          ↓
        </button>
      </div>
      <span class="fleet-name ui-text-strong"></span>
      <button
        class="fleet-settings-btn ui-button ui-button--quiet ui-button--compact"
        type="button"
        aria-label="Edit fleet faction and color"
      >
        Edit
      </button>
    </div>
    <dialog class="fleet-settings-dialog ui-dialog">
      <form method="dialog" class="fleet-settings-form ui-dialog__surface">
        <div class="fleet-settings-header ui-dialog__header">
          <strong class="fleet-settings-title"></strong>
          <button
            class="fleet-settings-close ui-icon-button"
            type="submit"
            value="cancel"
            aria-label="Close"
          >
            ×
          </button>
        </div>
        <label class="fleet-settings-field ui-field">
          <span class="ui-label">Faction</span>
          <select
            class="faction-select ui-select"
            aria-label="Faction"
          ></select>
        </label>
        <fieldset class="fleet-settings-field color-fieldset ui-field">
          <legend class="ui-label">Color</legend>
          <div class="color-options"></div>
          <button
            class="color-unset-btn ui-button ui-button--compact"
            type="button"
          >
            Use automatic color
          </button>
        </fieldset>
      </form>
    </dialog>
    <button
      class="remove-btn ui-icon-button"
      type="button"
      aria-label="Remove fleet"
    >
      ×
    </button>
  </div>
  <div class="fleet-ships"></div>
  <div class="fleet-add-row">
    <label
      class="ship-selector-control ui-command-select ui-command-select--button"
    >
      <span>+ Ship</span>
      <select
        class="ship-selector ui-native-overlay-select"
        aria-label="Add ship type"
      >
        <option value="interceptor">Interceptor</option>
        <option value="cruiser">Cruiser</option>
        <option value="dreadnought">Dreadnought</option>
        <option value="starbase">Starbase</option>
        <option value="orbital">Orbital</option>
      </select>
    </label>
    <div class="preset-chips" hidden>
      <label
        class="preset-chip preset-picker-wrap ui-command-select ui-command-select--pill"
      >
        <span>Ancient</span>
        <select
          class="preset-picker ui-native-overlay-select"
          aria-label="Add Ancient layout"
        >
          <option value="ancient">Base</option>
          <option value="ancient-adv">A</option>
          <option value="ancient-wa">WA</option>
        </select>
      </label>
      <label
        class="preset-chip preset-picker-wrap ui-command-select ui-command-select--pill"
      >
        <span>Guardian</span>
        <select
          class="preset-picker ui-native-overlay-select"
          aria-label="Add Guardian layout"
        >
          <option value="guardian">Base</option>
          <option value="guardian-adv">A</option>
          <option value="guardian-wa">WA</option>
        </select>
      </label>
      <label
        class="preset-chip preset-picker-wrap ui-command-select ui-command-select--pill"
      >
        <span>GCDS</span>
        <select
          class="preset-picker ui-native-overlay-select"
          aria-label="Add GCDS layout"
        >
          <option value="gcds">Base</option>
          <option value="gcds-adv">A</option>
          <option value="gcds-wa">WA</option>
        </select>
      </label>
    </div>
  </div>
  <div class="fleet-tech">
    <label class="tech-option">
      <input type="checkbox" class="antimatter-splitter-checkbox" />
      <span>Antimatter Splitter</span>
    </label>
    <label class="tech-option damage-planner-option">
      <span>Damage Planner</span>
      <select class="planner-type-select ui-select">
        <option value="npc">NPC</option>
        <option value="dps">Max DPS removal</option>
        <option value="optimal">Optimal</option>
      </select>
    </label>
  </div>
</div>
