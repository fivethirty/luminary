<div class="fleet card">
  <div class="fleet-header card-header flex-center gap-sm">
    <div class="fleet-title-row">
      <div class="role-controls" aria-label="Battle position controls">
        <button class="move-up-btn btn-icon" type="button" aria-label="Move up">
          ↑
        </button>
        <button
          class="move-down-btn btn-icon"
          type="button"
          aria-label="Move down"
        >
          ↓
        </button>
      </div>
      <span class="fleet-name text-bold"></span>
      <button
        class="fleet-settings-btn"
        type="button"
        aria-label="Edit fleet faction and color"
      >
        Edit
      </button>
    </div>
    <dialog class="fleet-settings-dialog">
      <form method="dialog" class="fleet-settings-form">
        <div class="fleet-settings-header">
          <strong class="fleet-settings-title"></strong>
          <button
            class="fleet-settings-close btn-icon"
            value="cancel"
            aria-label="Close"
          >
            ×
          </button>
        </div>
        <label class="fleet-settings-field">
          <span>Faction</span>
          <select class="faction-select" aria-label="Faction"></select>
        </label>
        <fieldset class="fleet-settings-field color-fieldset">
          <legend>Color</legend>
          <div class="color-options"></div>
          <button class="color-unset-btn" type="button">
            Use automatic color
          </button>
        </fieldset>
      </form>
    </dialog>
    <button class="remove-btn btn-icon" type="button" aria-label="Remove fleet">
      ×
    </button>
  </div>
  <div class="fleet-ships"></div>
  <div class="fleet-add-row">
    <label class="ship-selector-control">
      <span>+ Ship</span>
      <select class="ship-selector" aria-label="Add ship type">
        <option value="interceptor">Interceptor</option>
        <option value="cruiser">Cruiser</option>
        <option value="dreadnought">Dreadnought</option>
        <option value="starbase">Starbase</option>
        <option value="orbital">Orbital</option>
      </select>
    </label>
    <div class="preset-chips" hidden>
      <label class="preset-chip preset-picker-wrap">
        <span>Ancient</span>
        <select class="preset-picker" aria-label="Add Ancient layout">
          <option value="ancient">Base</option>
          <option value="ancient-adv">A</option>
          <option value="ancient-wa">WA</option>
        </select>
      </label>
      <label class="preset-chip preset-picker-wrap">
        <span>Guardian</span>
        <select class="preset-picker" aria-label="Add Guardian layout">
          <option value="guardian">Base</option>
          <option value="guardian-adv">A</option>
          <option value="guardian-wa">WA</option>
        </select>
      </label>
      <label class="preset-chip preset-picker-wrap">
        <span>GCDS</span>
        <select class="preset-picker" aria-label="Add GCDS layout">
          <option value="gcds">Base</option>
          <option value="gcds-adv">A</option>
          <option value="gcds-wa">WA</option>
        </select>
      </label>
    </div>
  </div>
  <div class="fleet-tech">
    <label class="tech-option">
      <input type="checkbox" class="antimatter-splitter-checkbox" />
      <span>Antimatter Splitter</span>
    </label>
    <label class="tech-option damage-planner-option">
      <span>Damage Planner</span>
      <select class="planner-type-select standard-select">
        <option value="npc">NPC</option>
        <option value="dps">Max DPS removal</option>
        <option value="optimal">Optimal</option>
      </select>
    </label>
  </div>
</div>
